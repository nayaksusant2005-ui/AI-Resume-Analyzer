<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Analyzer</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(
                135deg,
                #0f172a,
                #1e293b,
                #334155
            );
        }

        .container{
            width:90%;
            max-width:700px;
        }

        .card{
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(15px);
            border-radius:25px;
            padding:40px;
            text-align:center;
            box-shadow:0 0 30px rgba(0,0,0,0.4);
            color:white;
        }

        h1{
            font-size:42px;
            margin-bottom:15px;
        }

        p{
            color:#cbd5e1;
            margin-bottom:30px;
            line-height:1.6;
        }

        .upload-box{
            border:2px dashed #38bdf8;
            padding:35px;
            border-radius:20px;
            margin-bottom:20px;
        }

        input[type="file"]{
            color:white;
            font-size:16px;
        }

        button{
            background:#22c55e;
            color:white;
            border:none;
            padding:15px 35px;
            border-radius:12px;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:translateY(-3px);
            background:#16a34a;
        }

        .features{
            margin-top:30px;
            display:flex;
            justify-content:center;
            gap:15px;
            flex-wrap:wrap;
        }

        .tag{
            background:#1e40af;
            padding:10px 15px;
            border-radius:20px;
            font-size:14px;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="card">

        <h1>🚀 AI Resume Analyzer</h1>

        <p>
            Upload your Resume and instantly get
            ATS Score, Skill Analysis, Missing Skills,
            Improvement Suggestions and a Downloadable PDF Report.
        </p>

        <form action="/upload" method="POST" enctype="multipart/form-data">

            <div class="upload-box">

                <h3>📄 Upload Resume</h3>

                <br>

                <input
                    type="file"
                    name="resume"
                    accept=".txt,.pdf"
                    required
                >

            </div>

            <button type="submit">
                Analyze Resume
            </button>

        </form>

        <div class="features">

            <div class="tag">ATS Score</div>
            <div class="tag">Skill Detection</div>
            <div class="tag">Missing Skills</div>
            <div class="tag">PDF Report</div>

        </div>

    </div>

</div>

</body>
</html>
